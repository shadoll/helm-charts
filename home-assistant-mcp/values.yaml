image:
  repository: ghcr.io/homeassistant-ai/ha-mcp
  pullPolicy: IfNotPresent

command: ["ha-mcp-web"]

port: 8086

existingSecret: ""
secretEnvKeys: []
  # - envName: HOMEASSISTANT_URL
  #   secretKey: HOMEASSISTANT_URL
  # - envName: HOMEASSISTANT_TOKEN
  #   secretKey: HOMEASSISTANT_TOKEN

env: {}

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

nodeSelector: {}

tolerations: []

ingresses: {}
