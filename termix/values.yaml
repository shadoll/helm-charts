# Default values for Termix Helm Chart
image:
  repository: bugattiguy527/termix
  pullPolicy: Always

port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

persistence:
  enabled: true
  storageClass: local-path
  size: 1Gi

ingresses: {}
